version: '3.8'

services:
  backend:
    build: ./backend
    container_name: career-match-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=your-very-secret-key-change-this
      - JWT_EXPIRES_IN=24h
      - FRONTEND_URL=http://localhost:25426
      # Для внешнего API рекомендаций
      - EXTERNAL_EVAL_API_URL=https://external-service.com/api/v1
      - EXTERNAL_EVAL_API_KEY=your-api-key
      # Настройки SQLite – указываем путь внутри контейнера к volume
      - DB_STORAGE=/app/data/database.sqlite
      # Если Sequelice использует другие переменные для SQLite, добавьте их:
      # - DB_DIALECT=sqlite
    volumes:
      # Монтируем папку для сохранения файла базы данных
      - sqlite-data:/app/data
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: career-match-frontend
    restart: unless-stopped
    ports:
      - "25426:80"     # Доступ к приложению по http://localhost:25426
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  sqlite-data:
    driver: local