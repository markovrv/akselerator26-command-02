version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpered-backend
    ports:
      - "25425:25425"
    volumes:
      - ./backend/database.sqlite:/app/database.sqlite
      - ./backend/.env.docker:/app/.env
    networks:
      - vpered-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vpered-frontend
    ports:
      - "25426:25426"
    volumes:
      - ./frontend/.env.docker:/app/.env
    depends_on:
      - backend
    networks:
      - vpered-network
    restart: unless-stopped

networks:
  vpered-network:
    driver: bridge
